name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: keyflow-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: keyflow-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: keyflow-x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: keyflow-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz keyflow kf
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip keyflow.exe kf.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        id: checksums
        run: |
          arm_mac=$(sha256sum artifacts/keyflow-aarch64-apple-darwin/keyflow-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          intel_mac=$(sha256sum artifacts/keyflow-x86_64-apple-darwin/keyflow-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          intel_linux=$(sha256sum artifacts/keyflow-x86_64-unknown-linux-gnu/keyflow-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          {
            echo "aarch64_apple_darwin=$arm_mac"
            echo "x86_64_apple_darwin=$intel_mac"
            echo "x86_64_unknown_linux_gnu=$intel_linux"
          } >> "$GITHUB_OUTPUT"
          cat <<EOF > checksums.txt
          keyflow-aarch64-apple-darwin.tar.gz  $arm_mac
          keyflow-x86_64-apple-darwin.tar.gz  $intel_mac
          keyflow-x86_64-unknown-linux-gnu.tar.gz  $intel_linux
          EOF

      - name: Update Homebrew formula
        env:
          ARM_MAC_SHA: ${{ steps.checksums.outputs.aarch64_apple_darwin }}
          INTEL_MAC_SHA: ${{ steps.checksums.outputs.x86_64_apple_darwin }}
          INTEL_LINUX_SHA: ${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          perl -0pi -e 's/version ".*?"/version "'"$version"'"/' Formula/keyflow.rb
          perl -0pi -e 's|(url "https://github\.com/nianyi778/keyflow/releases/download/v#\{version\}/keyflow-aarch64-apple-darwin\.tar\.gz"\n\s*sha256 ")[^"]*(")|${1}'"$ARM_MAC_SHA"'${2}|s' Formula/keyflow.rb
          perl -0pi -e 's|(url "https://github\.com/nianyi778/keyflow/releases/download/v#\{version\}/keyflow-x86_64-apple-darwin\.tar\.gz"\n\s*sha256 ")[^"]*(")|${1}'"$INTEL_MAC_SHA"'${2}|s' Formula/keyflow.rb
          perl -0pi -e 's|(url "https://github\.com/nianyi778/keyflow/releases/download/v#\{version\}/keyflow-x86_64-unknown-linux-gnu\.tar\.gz"\n\s*sha256 ")[^"]*(")|${1}'"$INTEL_LINUX_SHA"'${2}|s' Formula/keyflow.rb

      - name: Commit formula update
        run: |
          if git diff --quiet -- Formula/keyflow.rb; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/keyflow.rb
          git commit -m "chore: update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:master

      - name: Sync formula to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/nianyi778/homebrew-keyflow.git /tmp/homebrew-keyflow
          cp Formula/keyflow.rb /tmp/homebrew-keyflow/Formula/keyflow.rb
          cd /tmp/homebrew-keyflow
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/keyflow.rb
          if ! git diff --cached --quiet; then
            git commit -m "chore: update keyflow formula to ${GITHUB_REF_NAME}"
            git push
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.txt

  deploy-worker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
